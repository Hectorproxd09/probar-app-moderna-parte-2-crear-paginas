<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Velion Builder</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="topbar">
  <button onclick="addElement('text')">Texto</button>
  <button onclick="addElement('button')">Botón</button>
  <button onclick="addElement('panel')">Panel</button>
  <button onclick="undo()">↶</button>
  <button onclick="redo()">↷</button>
</div>

<div class="app">

  <!-- SIDEBAR -->
  <div class="panel-ui">
    <h3>Propiedades</h3>

    <label>Texto</label>
    <input id="prop-text">

    <label>Tamaño</label>
    <input id="prop-size" type="number">

    <label>Color</label>
    <input id="prop-color" type="color">

    <label>Link</label>
    <input id="prop-link">

    <button onclick="deleteElement()">Eliminar</button>

    <hr>

    <h3>HTML</h3>
    <pre id="html-code"></pre>

    <h3>CSS</h3>
    <pre id="css-code"></pre>
  </div>

  <!-- CANVAS -->
  <div id="canvas"></div>

</div>

<script src="script.js"></script>
</body>
</html>
