<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Velion Studio v3</title>
    <style>
        :root {
            --bg: #050505;
            --side: #111112;
            --accent: #00f0ff;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: white; height: 100vh; display: flex; overflow: hidden; }

        /* BARRA IZQUIERDA */
        .sidebar {
            width: 300px;
            background: var(--side);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            z-index: 100;
        }

        .menu-section { padding: 20px; border-bottom: 1px solid var(--border); }
        .menu-section h3 { font-size: 10px; text-transform: uppercase; color: var(--accent); letter-spacing: 1.5px; margin-bottom: 15px; }

        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        button {
            background: #1a1a1c; border: 1px solid var(--border); color: white;
            padding: 10px; border-radius: 4px; cursor: pointer; font-size: 12px; transition: 0.2s;
        }
        button:hover { border-color: var(--accent); background: var(--accent); color: black; }

        input {
            width: 100%; background: #000; border: 1px solid var(--border);
            color: white; padding: 8px; border-radius: 4px; margin-bottom: 10px; outline: none;
        }

        /* LIENZO */
        #viewport { flex: 1; position: relative; background: #0a0a0a; overflow: hidden; }
        #canvas { width: 100%; height: 100%; position: relative; background-size: cover; background-position: center; }

        /* OBJETOS */
        .element {
            position: absolute; min-width: 40px; min-height: 40px;
            display: flex; align-items: center; justify-content: center;
            cursor: move; outline: 1px solid transparent; transition: outline 0.1s;
        }
        .element.selected { outline: 2px solid var(--accent); }
        
        .element.text { padding: 5px; font-weight: bold; line-height: 1; white-space: nowrap; }
        .element.panel {
            background: var(--glass); backdrop-filter: blur(15px);
            border: 1px solid var(--border); border-radius: 12px;
        }

        /* RESIZER */
        .resizer {
            width: 12px; height: 12px; background: var(--accent);
            position: absolute; right: -6px; bottom: -6px;
            cursor: nwse-resize; border-radius: 2px; display: none; z-index: 50;
        }
        .element.selected .resizer { display: block; }

        /* CÓDIGO EXPORTADO */
        #code-display {
            margin-top: auto; padding: 15px; background: #000; font-size: 9px;
            color: #666; max-height: 200px; overflow: auto; border-top: 1px solid var(--border);
        }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="menu-section">
        <h3>Insertar</h3>
        <div class="btn-group">
            <button onclick="addObj('text')">+ Texto</button>
            <button onclick="addObj('panel')">+ Panel</button>
        </div>
    </div>

    <div class="menu-section">
        <h3>Fondo Profundo</h3>
        <input id="bg-url" placeholder="URL Imagen o Video .mp4">
        <button style="width:100%" onclick="setBg()">Actualizar Fondo</button>
    </div>

    <div class="menu-section">
        <h3>Configuración</h3>
        <label style="font-size: 11px;">Color de Elemento</label>
        <input type="color" id="el-color" oninput="updateElProps()" style="height: 35px;">
    </div>

    <pre id="code-display">El código aparecerá aquí...</pre>
</div>

<div id="viewport">
    <div id="canvas"></div>
</div>

<script>
    let elements = [];
    let selectedId = null;
    let bgData = { type: 'none', url: '' };

    const canvas = document.getElementById('canvas');

    function addObj(type) {
        const id = Date.now();
        const el = {
            id: id,
            type: type,
            text: type === 'text' ? 'DOBLE CLIC' : '',
            x: 100, y: 100,
            w: type === 'text' ? 200 : 250,
            h: type === 'text' ? 50 : 150,
            color: '#ffffff',
            size: 32
        };
        elements.push(el);
        selectedId = id;
        render();
    }

    function setBg() {
        const url = document.getElementById('bg-url').value;
        if(!url) return;
        bgData.url = url;
        bgData.type = url.match(/\.(mp4|webm)$/i) ? 'video' : 'image';
        render();
    }

    // ACTUALIZAR COLOR
    function updateElProps() {
        const el = elements.find(e => e.id === selectedId);
        if(el) {
            el.color = document.getElementById('el-color').value;
            render();
        }
    }

    // TECLA BORRAR (BACKSPACE / DELETE)
    window.addEventListener('keydown', (e) => {
        if((e.key === 'Delete' || e.key === 'Backspace')) {
            // SI ESTÁ EDITANDO TEXTO, NO BORRAR EL OBJETO
            if(document.activeElement.getAttribute('contenteditable') === "true") return;
            
            if(selectedId) {
                elements = elements.filter(el => el.id !== selectedId);
                selectedId = null;
                render();
            }
        }
    });

    function render() {
        canvas.innerHTML = '';
        
        // Render Fondo
        if(bgData.type === 'video') {
            canvas.style.backgroundImage = 'none';
            const vid = document.createElement('video');
            vid.src = bgData.url; vid.autoplay = vid.loop = vid.muted = true;
            vid.style = "position:absolute; width:100%; height:100%; object-fit:cover; z-index:0; pointer-events:none;";
            canvas.appendChild(vid);
        } else if(bgData.type === 'image') {
            canvas.style.backgroundImage = `url(${bgData.url})`;
        }

        elements.forEach(el => {
            const div = document.createElement('div');
            div.className = `element ${el.type} ${el.id === selectedId ? 'selected' : ''}`;
            div.style = `left:${el.x}px; top:${el.y}px; width:${el.w}px; height:${el.h}px; color:${el.color}; font-size:${el.size}px; z-index:10;`;
            
            if(el.type === 'text') {
                div.innerText = el.text;
                div.ondblclick = (e) => {
                    div.contentEditable = true;
                    div.focus();
                };
                div.onblur = () => {
                    div.contentEditable = false;
                    el.text = div.innerText;
                    exportCode();
                };
            }

            // DRAG (MOVIMIENTO)
            div.onmousedown = (e) => {
                if(div.contentEditable === "true" || e.target.classList.contains('resizer')) return;
                selectedId = el.id;
                document.querySelectorAll('.element').forEach(item => item.classList.remove('selected'));
                div.classList.add('selected');

                let startX = e.clientX - el.x;
                let startY = e.clientY - el.y;

                document.onmousemove = (e2) => {
                    el.x = e2.clientX - startX;
                    el.y = e2.clientY - startY;
                    div.style.left = el.x + 'px';
                    div.style.top = el.y + 'px';
                    exportCode();
                };
                document.onmouseup = () => { document.onmousemove = null; };
            };

            // RESIZER (AGRANDAR/ACHICAR)
            const r = document.createElement('div');
            r.className = 'resizer';
            r.onmousedown = (e) => {
                e.stopPropagation();
                let startW = el.w;
                let startX = e.clientX;
                let startSize = el.size;

                document.onmousemove = (e2) => {
                    let diff = e2.clientX - startX;
                    el.w = startW + diff;
                    el.h = (el.type === 'text') ? el.h : el.h + (diff * 0.5); // Los paneles crecen en alto también
                    
                    if(el.type === 'text') {
                        el.size = Math.max(10, startSize + (diff * 0.4)); // Escala el texto
                        div.style.fontSize = el.size + 'px';
                    }
                    
                    div.style.width = el.w + 'px';
                    div.style.height = el.h + 'px';
                    exportCode();
                };
                document.onmouseup = () => { document.onmousemove = null; };
            };
            div.appendChild(r);

            canvas.appendChild(div);
        });
        exportCode();
    }

    function exportCode() {
        let html = bgData.type === 'video' ? `<video src="${bgData.url}" autoplay loop muted></video>\n` : '';
        let css = `body { background: ${bgData.type === 'image' ? `url('${bgData.url}')` : '#000'} center/cover; }\n`;

        elements.forEach((el, i) => {
            html += `<div class="item-${i}">${el.text}</div>\n`;
            css += `.item-${i} { position: absolute; left: ${el.x}px; top: ${el.y}px; color: ${el.color}; font-size: ${el.size}px; }\n`;
        });
        document.getElementById('code-display').innerText = html + "\n" + css;
    }

    canvas.onclick = (e) => { if(e.target === canvas) { selectedId = null; render(); } };
    render();
</script>

</body>
</html>
