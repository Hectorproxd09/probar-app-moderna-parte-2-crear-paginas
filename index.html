<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Velion Pro Builder</title>
    <style>
        :root {
            --bg-dark: #0a0a0b;
            --panel-dark: #141417;
            --accent: #00f0ff;
            --text-main: #e0e0e0;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* BARRA LATERAL IZQUIERDA */
        .sidebar {
            width: 320px;
            background: var(--panel-dark);
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            z-index: 100;
            overflow-y: auto;
        }

        .section-title {
            font-size: 10px;
            text-transform: uppercase;
            color: var(--accent);
            letter-spacing: 2px;
            padding: 20px 20px 10px;
            border-top: 1px solid var(--glass-border);
        }

        .tools-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            padding: 10px 20px 20px;
        }

        button {
            background: #1f1f23;
            border: 1px solid var(--glass-border);
            color: white;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: 0.2s;
        }

        button:hover { background: var(--accent); color: #000; font-weight: bold; }

        input, select {
            background: #000;
            border: 1px solid var(--glass-border);
            color: white;
            padding: 10px;
            border-radius: 6px;
            outline: none;
            width: 100%;
            margin-bottom: 10px;
        }

        /* ÁREA DE TRABAJO */
        .main-container { flex: 1; position: relative; overflow: hidden; background: #0f0f11; }

        #canvas {
            width: 100%;
            height: 100%;
            position: relative;
            background-size: cover;
            background-position: center;
        }

        /* ELEMENTOS DINÁMICOS */
        .element {
            position: absolute;
            min-width: 50px;
            min-height: 20px;
            outline: none;
            cursor: move;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: outline 0.1s;
        }

        .element.panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
        }

        .element.selected { outline: 2px solid var(--accent); }

        /* MANEJADOR DE TAMAÑO */
        .resizer {
            width: 10px;
            height: 10px;
            background: var(--accent);
            position: absolute;
            right: -5px;
            bottom: -5px;
            cursor: nwse-resize;
            border-radius: 2px;
            display: none;
        }
        .element.selected .resizer { display: block; }

        /* CÓDIGO */
        .code-box {
            background: #08080a;
            margin: 10px 20px;
            padding: 10px;
            border-radius: 6px;
            font-size: 10px;
            color: #777;
            max-height: 150px;
            overflow: auto;
            border: 1px solid #222;
            white-space: pre-wrap;
        }

        .bg-video {
            position: absolute;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            transform: translate(-50%, -50%);
            z-index: 0;
            pointer-events: none;
            object-fit: cover;
        }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="section-title">Construcción</div>
    <div class="tools-grid">
        <button onclick="addElement('text')">+ Texto</button>
        <button onclick="addElement('panel')">+ Panel</button>
    </div>

    <div class="section-title">Fondo Profesional</div>
    <div style="padding: 0 20px;">
        <input id="bg-input" placeholder="URL Imagen o Video (.mp4)">
        <button style="width: 100%;" onclick="applyBackground()">Aplicar Fondo</button>
    </div>

    <div class="section-title">Estilo Seleccionado</div>
    <div style="padding: 0 20px;">
        <label style="font-size: 11px;">Color Texto</label>
        <input type="color" id="style-color" oninput="updateStyle()">
        <label style="font-size: 11px;">Tamaño (px)</label>
        <input type="number" id="style-size" value="20" oninput="updateStyle()">
    </div>

    <div class="section-title">Exportación</div>
    <div class="code-box" id="html-code">Aquí aparecerá el HTML...</div>
    <div class="code-box" id="css-code">Aquí aparecerá el CSS...</div>
</div>

<div class="main-container">
    <div id="canvas"></div>
</div>

<script>
    let elements = [];
    let selectedId = null;
    let background = { type: 'none', url: '' };

    const canvas = document.getElementById('canvas');

    // CREAR ELEMENTO
    function addElement(type) {
        const el = {
            id: Date.now(),
            type: type,
            text: type === 'text' ? 'Nuevo Texto' : '',
            x: 100, y: 100,
            w: 200, h: 150,
            color: '#ffffff',
            size: 24
        };
        elements.push(el);
        selectedId = el.id;
        render();
    }

    // APLICAR FONDO
    function applyBackground() {
        const url = document.getElementById('bg-input').value;
        if(!url) return;
        background.url = url;
        background.type = url.match(/\.(mp4|webm)$/i) ? 'video' : 'image';
        render();
    }

    // BORRAR CON TECLADO
    window.addEventListener('keydown', (e) => {
        if((e.key === 'Delete' || e.key === 'Backspace') && selectedId) {
            if(document.activeElement.isContentEditable) return;
            elements = elements.filter(el => el.id !== selectedId);
            selectedId = null;
            render();
        }
    });

    // ACTUALIZAR ESTILOS DESDE LA BARRA
    function updateStyle() {
        const el = elements.find(e => e.id === selectedId);
        if(!el) return;
        el.color = document.getElementById('style-color').value;
        el.size = document.getElementById('style-size').value;
        render();
    }

    // RENDERIZAR TODO
    function render() {
        // Guardar scroll o foco si fuera necesario, pero aquí limpiamos
        canvas.innerHTML = '';

        // Fondo
        if(background.type === 'video') {
            const video = document.createElement('video');
            video.src = background.url; video.autoplay = video.loop = video.muted = true;
            video.className = 'bg-video';
            canvas.appendChild(video);
        } else if(background.type === 'image') {
            canvas.style.backgroundImage = `url(${background.url})`;
        }

        elements.forEach(el => {
            const div = document.createElement('div');
            div.className = `element ${el.type} ${el.id === selectedId ? 'selected' : ''}`;
            div.style.left = el.x + 'px';
            div.style.top = el.y + 'px';

            if(el.type === 'panel') {
                div.style.width = el.w + 'px';
                div.style.height = el.h + 'px';
            } else {
                div.style.color = el.color;
                div.style.fontSize = el.size + 'px';
                div.contentEditable = (el.id === selectedId);
                div.innerText = el.text;
                
                // Guardar texto al escribir
                div.onblur = () => { el.text = div.innerText; exportCode(); };
            }

            // Seleccionar y Drag
            div.onmousedown = (e) => {
                if(e.target.classList.contains('resizer')) return;
                selectedId = el.id;
                document.getElementById('style-color').value = el.color;
                document.getElementById('style-size').value = el.size;
                
                let startX = e.clientX - el.x;
                let startY = e.clientY - el.y;

                document.onmousemove = (e2) => {
                    el.x = e2.clientX - startX;
                    el.y = e2.clientY - startY;
                    div.style.left = el.x + 'px';
                    div.style.top = el.y + 'px';
                    exportCode();
                };

                document.onmouseup = () => {
                    document.onmousemove = null;
                    render(); // Re-render para actualizar estado de selección
                };
            };

            // Resizer para Paneles
            if(el.type === 'panel') {
                const r = document.createElement('div');
                r.className = 'resizer';
                r.onmousedown = (e) => {
                    e.stopPropagation();
                    let startW = el.w;
                    let startH = el.h;
                    let startX = e.clientX;
                    let startY = e.clientY;

                    document.onmousemove = (e2) => {
                        el.w = startW + (e2.clientX - startX);
                        el.h = startH + (e2.clientY - startY);
                        div.style.width = el.w + 'px';
                        div.style.height = el.h + 'px';
                        exportCode();
                    };
                    document.onmouseup = () => { document.onmousemove = null; };
                };
                div.appendChild(r);
            }

            canvas.appendChild(div);
        });
        exportCode();
    }

    // EXPORTAR CÓDIGO REAL
    function exportCode() {
        let html = "";
        let css = "/* Estilos Generados */\nbody { margin: 0; min-height: 100vh; " + 
                  (background.type === 'image' ? `background: url('${background.url}') center/cover;` : "background: #000;") + "}\n";

        if(background.type === 'video') {
            html += `<video src="${background.url}" autoplay loop muted style="position:fixed;width:100%;height:100%;object-fit:cover;z-index:-1;"></video>\n`;
        }

        elements.forEach((el, i) => {
            html += `<div class="obj-${i}">${el.text}</div>\n`;
            css += `.obj-${i} {\n  position: absolute;\n  left: ${el.x}px; top: ${el.y}px;\n`;
            if(el.type === 'panel') {
                css += `  width: ${el.w}px; height: ${el.h}px;\n  background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border-radius: 15px; border: 1px solid rgba(255,255,255,0.2);\n`;
            } else {
                css += `  color: ${el.color}; font-size: ${el.size}px; font-weight: bold;\n`;
            }
            css += "}\n\n";
        });

        document.getElementById('html-code').innerText = html || "Esperando elementos...";
        document.getElementById('css-code').innerText = css;
    }

    // Deseleccionar al tocar el fondo
    canvas.onclick = (e) => { if(e.target === canvas) { selectedId = null; render(); } };

    render();
</script>

</body>
</html>
