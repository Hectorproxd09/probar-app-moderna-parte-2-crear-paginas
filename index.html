<div class="sidebar">
    <div class="top-tools">
        <button onclick="addElement('text')">Texto</button>
        <button onclick="addElement('panel')">Panel Vidrio</button>
    </div>

    <h3>Fondo</h3>
    <div class="prop-group">
        <input id="bg-url" placeholder="URL Imagen o Video">
        <button onclick="setBackground()">Aplicar Fondo</button>
    </div>

    <h3>Propiedades</h3>
    <div class="prop-group">
        <label>Tamaño Letra</label>
        <input type="range" min="10" max="100" oninput="elements.find(e=>e.id==selectedId).size=this.value; render()">
        <label>Color</label>
        <input type="color" oninput="elements.find(e=>e.id==selectedId).color=this.value; render()">
    </div>

    <div class="code-area">
        <h3>HTML</h3>
        <pre id="html-code"></pre>
        <h3>CSS</h3>
        <pre id="css-code"></pre>
    </div>
</div>

<div class="app">
    <div id="canvas"></div>
</div>
