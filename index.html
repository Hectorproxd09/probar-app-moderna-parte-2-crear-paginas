<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Velion Logic Editor v4</title>
    <style>
        /* === CSS: LA ESTÉTICA === */
        :root {
            --bg: #050505;
            --side: #111112;
            --accent: #00f0ff;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: white; height: 100vh; display: flex; overflow: hidden; }

        /* Barra a la izquierda */
        .sidebar {
            width: 300px;
            background: var(--side);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            z-index: 100;
        }

        .menu-section { padding: 20px; border-bottom: 1px solid var(--border); }
        .menu-section h3 { font-size: 10px; text-transform: uppercase; color: var(--accent); letter-spacing: 1.5px; margin-bottom: 15px; }

        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        button {
            background: #1a1a1c; border: 1px solid var(--border); color: white;
            padding: 10px; border-radius: 4px; cursor: pointer; font-size: 12px; transition: 0.2s;
        }
        button:hover { background: var(--accent); color: black; font-weight: bold; }

        input {
            width: 100%; background: #000; border: 1px solid var(--border);
            color: white; padding: 8px; border-radius: 4px; margin-bottom: 10px; outline: none;
        }

        /* Lienzo de trabajo */
        #viewport { flex: 1; position: relative; background: #0a0a0a; overflow: hidden; }
        #canvas { width: 100%; height: 100%; position: relative; background-size: cover; background-position: center; }

        /* Elementos dinámicos */
        .element {
            position: absolute; min-width: 40px; min-height: 40px;
            display: flex; align-items: center; justify-content: center;
            cursor: move; outline: 2px solid transparent;
        }
        .element.selected { outline: 2px solid var(--accent); }
        
        .element.text { padding: 10px; white-space: nowrap; font-weight: bold; }
        .element.panel {
            background: var(--glass); backdrop-filter: blur(15px);
            border: 1px solid var(--border); border-radius: 15px;
        }

        /* Tirador para agrandar/achicar */
        .resizer {
            width: 14px; height: 14px; background: var(--accent);
            position: absolute; right: -7px; bottom: -7px;
            cursor: nwse-resize; border-radius: 3px; display: none; z-index: 100;
        }
        .element.selected .resizer { display: block; }

        /* Pantalla de código */
        #code-display {
            margin-top: auto; padding: 15px; background: #000; font-size: 9px;
            color: #666; max-height: 180px; overflow: auto; border-top: 1px solid var(--border);
        }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="menu-section">
        <h3>Herramientas</h3>
        <div class="btn-group">
            <button onclick="addObj('text')">+ Texto</button>
            <button onclick="addObj('panel')">+ Panel</button>
        </div>
    </div>

    <div class="menu-section">
        <h3>Fondo Dinámico</h3>
        <input id="bg-url" placeholder="URL de Imagen o MP4">
        <button style="width:100%" onclick="setBg()">Aplicar Fondo</button>
    </div>

    <div class="menu-section">
        <h3>Color</h3>
        <input type="color" id="el-color" oninput="updateColor()" style="height: 40px;">
    </div>

    <pre id="code-display">Generando código...</pre>
</div>

<div id="viewport">
    <div id="canvas"></div>
</div>

<script>
    /* === JAVASCRIPT: LA LOGÍSTICA === */
    let elements = [];
    let selectedId = null;
    let bgData = { type: 'none', url: '' };

    const canvas = document.getElementById('canvas');

    function addObj(type) {
        const id = Date.now();
        const el = {
            id: id,
            type: type,
            text: type === 'text' ? 'DOBLE CLIC AQUÍ' : '',
            x: 150, y: 150,
            w: type === 'text' ? 220 : 250,
            h: type === 'text' ? 60 : 150,
            color: '#ffffff',
            size: 30
        };
        elements.push(el);
        selectedId = id;
        render();
    }

    function setBg() {
        const url = document.getElementById('bg-url').value;
        if(!url) return;
        bgData.url = url;
        bgData.type = url.match(/\.(mp4|webm)$/i) ? 'video' : 'image';
        render();
    }

    function updateColor() {
        const el = elements.find(e => e.id === selectedId);
        if(el) {
            el.color = document.getElementById('el-color').value;
            render();
        }
    }

    // LOGÍSTICA DE TECLADO: Diferenciar entre borrar texto y borrar objeto
    window.addEventListener('keydown', (e) => {
        if (e.key === 'Delete' || e.key === 'Backspace') {
            // Si el usuario tiene el cursor dentro de un texto, NO borramos el objeto
            if (document.activeElement.getAttribute('contenteditable') === "true") return;

            if (selectedId) {
                elements = elements.filter(el => el.id !== selectedId);
                selectedId = null;
                render();
            }
        }
    });

    function render() {
        canvas.innerHTML = '';
        
        // Cargar Fondo
        if(bgData.type === 'video') {
            const vid = document.createElement('video');
            vid.src = bgData.url; vid.autoplay = vid.loop = vid.muted = true;
            vid.style = "position:absolute; width:100%; height:100%; object-fit:cover; z-index:0; pointer-events:none;";
            canvas.appendChild(vid);
        } else if(bgData.type === 'image') {
            canvas.style.backgroundImage = `url(${bgData.url})`;
        }

        elements.forEach(el => {
            const div = document.createElement('div');
            div.className = `element ${el.type} ${el.id === selectedId ? 'selected' : ''}`;
            div.style.left = el.x + 'px';
            div.style.top = el.y + 'px';
            div.style.width = el.w + 'px';
            div.style.height = el.h + 'px';
            div.style.color = el.color;
            div.style.fontSize = el.size + 'px';
            
            if(el.type === 'text') {
                div.innerText = el.text;
                // LOGÍSTICA DE EDICIÓN: Doble clic para escribir
                div.ondblclick = (e) => {
                    div.contentEditable = true;
                    div.focus();
                };
                // Guardar cambios al terminar
                div.onblur = () => {
                    div.contentEditable = false;
                    el.text = div.innerText;
                    exportCode();
                };
            }

            // LOGÍSTICA DE MOVIMIENTO
            div.onmousedown = (e) => {
                if(div.contentEditable === "true" || e.target.classList.contains('resizer')) return;
                
                selectedId = el.id;
                render(); // Refrescar para mostrar bordes de selección

                let startX = e.clientX - el.x;
                let startY = e.clientY - el.y;

                document.onmousemove = (e2) => {
                    el.x = e2.clientX - startX;
                    el.y = e2.clientY - startY;
                    div.style.left = el.x + 'px';
                    div.style.top = el.y + 'px';
                    exportCode();
                };
                document.onmouseup = () => { document.onmousemove = null; };
            };

            // LOGÍSTICA DE REDIMENSIÓN (AGRANDAR/ACHICAR)
            const resizer = document.createElement('div');
            resizer.className = 'resizer';
            resizer.onmousedown = (e) => {
                e.stopPropagation();
                let startW = el.w;
                let startX = e.clientX;
                let startSize = el.size;

                document.onmousemove = (e2) => {
                    let diff = e2.clientX - startX;
                    el.w = Math.max(40, startW + diff);
                    
                    // Si es texto, el tamaño de fuente cambia proporcionalmente
                    if(el.type === 'text') {
                        el.size = Math.max(12, startSize + (diff * 0.5));
                        div.style.fontSize = el.size + 'px';
                    } else {
                        // Si es panel, también crece hacia abajo
                        el.h = Math.max(40, el.h + (diff * 0.2)); 
                    }
                    
                    div.style.width = el.w + 'px';
                    div.style.height = el.h + 'px';
                    exportCode();
                };
                document.onmouseup = () => { document.onmousemove = null; };
            };
            div.appendChild(resizer);

            canvas.appendChild(div);
        });
        exportCode();
    }

    function exportCode() {
        let html = bgData.type === 'video' ? `<video src="${bgData.url}" autoplay loop muted></video>\n` : '';
        let css = `body { background: ${bgData.type === 'image' ? `url('${bgData.url}')` : '#000'} center/cover; }\n`;

        elements.forEach((el, i) => {
            html += `<div class="obj-${i}">${el.text}</div>\n`;
            css += `.obj-${i} { position: absolute; left: ${el.x}px; top: ${el.y}px; color: ${el.color}; font-size: ${el.size}px; }\n`;
        });
        document.getElementById('code-display').innerText = html + "\n" + css;
    }

    // Deseleccionar al tocar el fondo vacío
    canvas.onclick = (e) => { if(e.target === canvas) { selectedId = null; render(); } };

    render();
</script>

</body>
</html>
