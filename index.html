<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Velion Builder</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="topbar">
  <button onclick="addElement('text')">Texto</button>
  <button onclick="addElement('button')">Botón</button>
  <button onclick="addElement('panel')">Panel</button>

  <input id="bg-url" placeholder="Fondo (img o video URL)">
  <button onclick="setBackground()">Aplicar Fondo</button>

  <button onclick="toggleSnap()">▢ Snap</button>

  <button onclick="undo()">↶</button>
  <button onclick="redo()">↷</button>
</div>

<div class="app">
  <div id="canvas"></div>

  <div class="panel-ui">
    <!-- 🔥 SECCIÓN DE PANTALLAS -->
    <h3>Pantallas</h3>
    <div class="screen-controls">
      <select id="screen-select" onchange="switchScreen(this.value)"></select>
      <button onclick="addScreen()">+ Nueva</button>
    </div>
    <button class="delete-btn" onclick="deleteScreen()" style="width: 100%; margin-top: 5px;">Eliminar Pantalla Actual</button>

    <hr>

    <h3>Propiedades</h3>
    <input id="prop-text" placeholder="Texto">
    <input id="prop-size" type="number" placeholder="Tamaño">
    <input id="prop-color" type="color">
    <input id="prop-link" placeholder="Link externo (URL)">
    
    <!-- 🔥 NUEVO: SELECCIÓN DE PANTALLA DESTINO -->
    <label style="font-size: 12px; opacity: 0.8; margin-top: 10px; display: block;">Acción al hacer clic:</label>
    <select id="prop-target-screen">
      <option value="">-- No ir a ninguna pantalla --</option>
    </select>

    <button class="delete-btn" onclick="deleteElement()" style="margin-top: 15px;">Eliminar Elemento</button>

    <hr>

    <h3>HTML Generado (con JS)</h3>
    <pre id="html-code"></pre>

    <h3>CSS Generado</h3>
    <pre id="css-code"></pre>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
